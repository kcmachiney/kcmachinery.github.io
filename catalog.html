<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Product Catalog · Kechuan Machinery</title>
<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1c1917;color:#1c1917;line-height:1.6}
a{text-decoration:none;color:inherit}
.page{height:100vh;display:flex;flex-direction:column;justify-content:center;background:#1c1917;position:relative}
.back{position:fixed;top:2rem;left:2.5rem;z-index:50;display:inline-flex;align-items:center;gap:.35rem;font-size:.82rem;color:rgba(255,255,255,.5);transition:color .2s}
.back:hover{color:#fff}

/* Slider */
.slider{position:relative;max-width:780px;width:100%;margin:0 auto;border-radius:1.2rem;overflow:hidden;box-shadow:0 12px 60px rgba(0,0,0,.4)}
.track{display:flex;transition:transform .5s cubic-bezier(.25,.46,.45,.94);will-change:transform}
.track .s{min-width:100%;flex-shrink:0}
.track .s .w{position:relative;width:100%;padding-bottom:135%;background:#292524;overflow:hidden}
.track .s .w img{position:absolute;inset:0;width:100%;height:100%;object-fit:contain;object-position:50% 0%;pointer-events:none}

.nav{display:flex;justify-content:space-between;align-items:center;padding:1rem 1.5rem;background:#292524}
.nav .i{font-size:.8rem;color:rgba(255,255,255,.45)}
.nav .i strong{color:#fafaf9;font-weight:500}
.nb{display:inline-flex;align-items:center;justify-content:center;width:2.6rem;height:2.6rem;border-radius:50%;border:1px solid rgba(255,255,255,.2);background:rgba(255,255,255,.06);color:#fafaf9;font-size:1.2rem;cursor:pointer;transition:all .2s;user-select:none}
.nb:hover:not(:disabled){border-color:#fafaf9;background:rgba(255,255,255,.12)}
.nb:disabled{opacity:.15;cursor:not-allowed}
.dots{display:flex;justify-content:center;gap:.5rem;padding:.8rem 0 .6rem;background:#292524}
.dots .d{width:8px;height:8px;border-radius:50%;background:rgba(255,255,255,.2);border:none;cursor:pointer;transition:all .3s}
.dots .d.on{width:30px;border-radius:5px;background:#fafaf9}

/* Lightbox */
.lb{display:none;position:fixed;z-index:200;inset:0;background:rgba(0,0,0,.9);backdrop-filter:blur(8px);justify-content:center;align-items:center;cursor:zoom-out;padding:2rem}
.lb.on{display:flex}
.lb img{max-width:94vw;max-height:90vh;object-fit:contain;border-radius:.6rem;box-shadow:0 20px 80px rgba(0,0,0,.5);cursor:default}
.lb .x{position:absolute;top:2rem;right:2.5rem;font-size:1.5rem;color:#fff;opacity:.5;cursor:pointer;transition:opacity .25s;background:none;border:none}
.lb .x:hover{opacity:1}

@media(max-width:768px){.back{top:1.2rem;left:1.2rem}.slider{border-radius:.8rem}.nav{padding:.7rem 1rem}.nb{width:2.6rem;height:2.6rem}}
</style>
</head>
<body>
<div class="page">
<a href="index.html" class="back">&#8592; Back to Home</a>
<div class="slider">
<div class="track" id="T">
<div class="s"><div class="w"><img src="images/page_1.jpg" alt="1" loading="lazy" /></div></div>
<div class="s"><div class="w"><img src="images/page_2.jpg" alt="2" loading="lazy" /></div></div>
<div class="s"><div class="w"><img src="images/page_3.jpg" alt="3" loading="lazy" /></div></div>
<div class="s"><div class="w"><img src="images/page_4.jpg" alt="4" loading="lazy" /></div></div>
<div class="s"><div class="w"><img src="images/page_5.jpg" alt="5" loading="lazy" /></div></div>
</div>
<div class="dots" id="D"></div>
<div class="nav">
<div class="i"><strong id="N">01</strong> / <span id="TOT">05</span></div>
<div style="display:flex;gap:.5rem">
<button class="nb" id="P" onclick="prev()">&#8249;</button>
<button class="nb" id="Q" onclick="next()">&#8250;</button>
</div>
</div>
</div>
</div>
<div class="lb" id="L"><button class="x" onclick="closeLB()">&#10005;</button><img id="LI" src="" alt="" onclick="event.stopPropagation()" /></div>

<script>
var T=document.getElementById('T'),SL=T.querySelectorAll('.s'),TL=SL.length,CU=0;
function go(i){if(i<0||i>=TL)return;CU=i;T.style.transform='translateX(-'+(i*100)+'%)';document.getElementById('N').textContent=String(i+1).padStart(2,'0');document.getElementById('P').disabled=i===0;document.getElementById('Q').disabled=i===TL-1;document.querySelectorAll('.d').forEach(function(d,j){d.classList.toggle('on',j===i)})}
function next(){if(CU<TL-1)go(CU+1)}
function prev(){if(CU>0)go(CU-1)}
var DC=document.getElementById('D');for(var i=0;i<TL;i++){var d=document.createElement('button');d.className='d'+(i===0?' on':'');d.onclick=function(j){return function(){go(j)}}(i);DC.appendChild(d)}
T.onclick=function(e){var w=e.target.closest('.w');if(!w)return;var r=w.getBoundingClientRect(),x=e.clientX-r.left,wid=r.width;if(x<wid/2){if(wid>0&&CU>0)go(CU-1)}else{if(CU<TL-1)go(CU+1)}}
var sx=0;T.addEventListener('touchstart',function(e){sx=e.changedTouches[0].screenX});
T.addEventListener('touchend',function(e){var dx=e.changedTouches[0].screenX-sx;if(Math.abs(dx)>50){if(dx<0)next();else prev()}});
go(0);
</script>
</body>
</html>
