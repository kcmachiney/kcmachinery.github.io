<style>
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden}
body{font-family:Inter,-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;background:#1c1917;color:#fafaf9;line-height:1.6}
a{text-decoration:none}
.page{height:100vh;display:flex;flex-direction:column;justify-content:center;align-items:center;padding:2rem;position:relative}
.page::before{content:'';position:absolute;inset:0;background:radial-gradient(ellipse 60% 40% at 50% 40%,rgba(217,119,6,.06),transparent 70%);pointer-events:none}
.back{position:fixed;top:2rem;left:2.5rem;z-index:50;display:inline-flex;align-items:center;gap:.35rem;font-size:.82rem;color:rgba(255,255,255,.5);transition:color .2s}
.back:hover{color:#fff}
.card{max-width:550px;width:100%;text-align:center;position:relative;z-index:1}
.card .brand{font-size:.75rem;letter-spacing:.35em;text-transform:uppercase;color:rgba(255,255,255,.35);margin-bottom:.5rem}
.card h1{font-size:clamp(1.8rem,3.5vw,2.6rem);font-weight:500;letter-spacing:-0.02em;margin-bottom:.4rem}
.card .tag{color:rgba(255,255,255,.5);font-size:.9rem;margin-bottom:2rem}
.card .ln{width:2rem;height:2px;background:rgba(217,119,6,.4);margin:0 auto 2rem;border-radius:1px}
.item{display:flex;align-items:center;justify-content:center;gap:.8rem;padding:1rem 0;border-bottom:1px solid rgba(255,255,255,.06)}
.item:last-child{border-bottom:none}
.item .ic{font-size:1.1rem;min-width:1.5rem}
.item .vl{font-size:.95rem;color:#fafaf9}
.item .vl a{color:#f59e0b;transition:color .2s}
.item .vl a:hover{color:#fbbf24}
.send-btn{display:inline-flex;align-items:center;gap:.6rem;padding:.85rem 2rem;border-radius:999px;font-size:.9rem;font-weight:500;border:none;cursor:pointer;transition:all .25s;margin-top:1.5rem}
.send-btn-wa{background:#25D366;color:#1c1917}
.send-btn-wa:hover{background:#20bd5a;transform:translateY(-1px)}
.send-btn-em{background:transparent;color:#fafaf9;border:1px solid rgba(255,255,255,.2)}
.send-btn-em:hover{border-color:rgba(255,255,255,.5);transform:translateY(-1px)}

/* WhatsApp Float */
.whatsapp-float{position:fixed;bottom:2rem;right:2rem;z-index:1000;display:flex;align-items:center;gap:.5rem;background:#25D366;color:#fff;padding:.7rem 1.3rem;border-radius:999px;font-size:.85rem;font-weight:500;box-shadow:0 4px 20px rgba(37,211,102,.35);transition:all .25s;cursor:pointer}
.whatsapp-float:hover{transform:translateY(-2px);box-shadow:0 6px 28px rgba(37,211,102,.45)}
.whatsapp-float .wa-icon{font-size:1.4rem}

@media(max-width:768px){.page{padding:4rem 1.5rem}.back{top:1.2rem;left:1.2rem}}
</style>
</head>
